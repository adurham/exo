model_id = "mlx-community/DeepSeek-V4-Flash"
n_layers = 43
hidden_size = 4096
num_key_value_heads = 1
supports_tensor = true
tasks = ["TextGeneration"]
family = "deepseek"
quantization = "8bit"
base_model = "DeepSeek V4 Flash"
capabilities = ["text", "thinking", "thinking_toggle"]
reasoning_dialect = "tool_conditional"

context_length = 1048576
backends = ["MlxMetal", "MlxCuda", "MlxCpu"]
[storage_size]
in_bytes = 155095760030

# Source: https://huggingface.co/deepseek-ai/DeepSeek-V4-Flash
# temperature/top_p are DeepSeek's official recommendation (temp=1.0, top_p=1.0,
# all modes). min_p is a guardrail DeepSeek does not specify: with top_p=1.0 the
# sampling tail is fully open, and DSv4 was observed degenerating into incoherent
# garbage partway through long structured tool-call bodies (e.g. a large
# write_file `content` arg dissolving into stray quotes/TODO prose, leaving the
# DSML invoke unterminated -> parser reject -> retry loop -> dead turn). min_p is
# adaptive to model confidence: it clips the junk tail hardest exactly when the
# model is confident (mid-code/JSON), while leaving low-confidence prose/reasoning
# free. 0.05 is a gentle floor. top_p lowered 1.0 -> 0.95 (a small departure from
# DeepSeek's bare temp=1.0/top_p=1.0 rec) after min_p=0.05 alone did not stop the
# model corrupting its DSML closing tags partway through LONG tool-call content
# (write_file bodies closing with bare </parameter></file></think> instead of the
# sentinel-bearing close -> unterminated invoke -> clean-fail -> retry loop). 0.95
# trims the extreme tail more aggressively to reduce that degeneration frequency.
[sampling_defaults]
temperature = 1.0
top_p = 0.95
min_p = 0.05
